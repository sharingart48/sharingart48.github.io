<style>
  /* ============================================================
     DESIGN TOKENS
     ============================================================ */
  :root{
    --canvas:#F7F7F2;
    --canvas-alt:#EFEEE6;
    --ink:#141414;
    --ink-soft:#3a3a37;
    --concrete:#8a8a82;
    --concrete-light:#d8d6cc;
    --accent:#2B4CFF;
    --accent-ink:#0e1f8f;
    --white:#ffffff;
    --line: 1px solid var(--ink);
    --line-soft: 1px solid var(--concrete-light);
    --display-font: 'Archivo Black', 'Cairo', sans-serif;
    --momo-font: 'Momo Signature', sans-serif;
    --serif-font: 'Fraunces', 'Cairo', serif;
    --ui-font: 'Inter', 'Cairo', sans-serif;
    --spray-font: 'Rubik Spray Paint', 'Cairo', cursive;
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--canvas);
    color:var(--ink);
    font-family:var(--ui-font);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* Arabic locale swaps default running text to Cairo across the board */
  body.lang-ar{ --ui-font:'Cairo', sans-serif; --serif-font:'Cairo', sans-serif; }
  body.lang-ar .site-title{ 
    /*font-family:'Cairo', sans-serif;*/
    font-family:var(--momo-font);
    font-weight:800; }

  [dir="ltr"] .num, [dir="rtl"] .num{ direction:ltr; unicode-bidi:isolate; }

  a{ color:inherit; }
  img{ max-width:100%; display:block; }

  .wrap{ max-width:960px; margin:0 auto; padding:0 24px; }

  /* ============================================================
     HEADER & GLOBAL NAVIGATION
     ============================================================ */

  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 32px;
    background: rgba(251, 251, 250, 0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(0,0,0,0.03);
  }

  /* ============================================================
     TOPBAR
     ============================================================ */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px;
    border-bottom: var(--line-soft);
    max-width:960px; margin:0 auto;
    gap:16px; flex-wrap:wrap;
  }
  .contact-inline{ display:flex; gap:18px; align-items:center; flex-wrap:wrap; }
  .contact-inline a{
    display:inline-flex; align-items:center; gap:6px;
    text-decoration:none; font-size:13px; letter-spacing:.02em;
    color:var(--ink-soft);
  }
  .contact-inline a svg{ width:16px; height:16px; fill:var(--ink-soft); }
  .contact-inline a:hover{ color:var(--accent); }
  .contact-inline a:hover svg{ fill:var(--accent); }

  .lang-switch{ display:flex; gap:2px; border: var(--line); }
  .lang-switch button{
    font-family:var(--ui-font); font-size:12px; font-weight:600; letter-spacing:.05em;
    background:none; border:none; padding:6px 12px; cursor:pointer; color:var(--ink-soft);
  }
  .lang-switch button.active{ background:var(--ink); color:var(--white); }
  .lang-switch button:not(.active):hover{ background:var(--canvas-alt); }

  .footer-divider {
    border: none;
    border-top: 1px solid #2c2a23;
    margin: 0 0 18px;
  }

  /* ============================================================
     GRAFFITI FEATURE — top strip mode
     ============================================================ */
  .graffiti-top{
    background:var(--ink);
    color:var(--white);
    padding:10px 0;
    overflow:hidden;
    white-space:nowrap;
    border-bottom: var(--line);
  }
  .graffiti-top .track{
    display:inline-block;
    font-family:var(--spray-font);
    font-size:26px;
    letter-spacing:.04em;
    animation: scrollTag 22s linear infinite;
  }
  .graffiti-top .track span{ padding:0 28px; opacity:.92; }
  @keyframes scrollTag{ from{ transform:translateX(0);} to{ transform:translateX(-50%);} }

  /* GRAFFITI FEATURE — background watermark mode */
  .graffiti-bg{
    position:absolute;
    inset:0;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
  }
  .graffiti-bg span{
    font-family:var(--spray-font);
    font-size:min(22vw, 260px);
    color:var(--ink);
    opacity:.05;
    white-space:nowrap;
    transform:rotate(-6deg);
  }

  /* ============================================================
     HERO
     ============================================================ */
  .site-header{ position:relative; }
  .hero{
    position:relative; z-index:1;
    max-width:960px; margin:0 auto;
    padding:64px 24px 40px;
    text-align:center;
  }
  .site-title{
    font-family:var(--momo-font);
    font-size:clamp(34px, 7vw, 72px);
    line-height:0.98;
    margin:0 0 18px;
    /*margin: -8px 0px 5px;*/
    text-transform:lowercase;
    /*letter*/-spacing:-.01em;
  }
  .site-title .infinity{ color:var(--accent); }
  .tagline{
    font-family:var(--serif-font);
    font-style:italic;
    font-size:clamp(19px, 2.4vw, 20px);
    color:var(--ink-soft);
    max-width:520px;
    margin:0 auto 22px;
    font-weight:400;
  }
  .delivery-line{
    display:inline-block;
    font-family:var(--ui-font);
    font-size:15px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--white);
    background:var(--accent);
    padding:7px 16px;
  }

  /* ============================================================
     INTRO
     ============================================================ */
  .intro{
    max-width:640px; margin:0 auto;
    padding:8px 24px 56px;
    text-align:center;
  }
  .intro p{
    font-size:15.5px; line-height:1.7; color:var(--ink-soft); margin:0;
  }

  /* ============================================================
     GALLERY — vertical stack
     ============================================================ */
  .gallery{ max-width:760px; margin:0 auto; padding:0 24px 100px; }
  .gallery-heading{
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom: var(--line);
    padding-bottom:10px; margin-bottom:8px;
  }
  .gallery-heading h2{
    font-family:var(--display-font);
    font-size:14px; text-transform:uppercase; letter-spacing:.14em;
    margin:0;
  }
  .gallery-heading .count{ font-size:12px; color:var(--concrete); font-family:var(--ui-font); }

  .piece{
    display:grid; grid-template-columns: 1fr;
    border-bottom: var(--line-soft);
    padding:44px 0;
  }
  .piece:first-of-type{ padding-top:32px; }

  .piece-frame{
    position:relative;
    border: 1.5px solid var(--ink);
    background:var(--canvas-alt);
    aspect-ratio: 4 / 5;
    max-width:420px;
    margin:0 auto 26px;
    overflow:hidden;
  }
  .piece-frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  .piece-frame .corner{
    position:absolute; width:14px; height:14px;
    border-color:var(--accent); border-style:solid; border-width:0;
  }
  .piece-frame .corner.tl{ top:-1.5px; left:-1.5px; border-top-width:3px; border-left-width:3px; }
  .piece-frame .corner.br{ bottom:-1.5px; right:-1.5px; border-bottom-width:3px; border-right-width:3px; }

  .piece-frame.placeholder{
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:8px;
    color:var(--concrete);
  }
  .piece-frame.placeholder svg{ width:34px; height:34px; opacity:.5; }
  .piece-frame.placeholder span{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; }

  .piece-body{ text-align:center; max-width:480px; margin:0 auto; }
  .piece-num{
    font-family:var(--ui-font); font-size:11px; letter-spacing:.14em;
    color:var(--accent); font-weight:600; margin-bottom:8px;
  }
  .piece-title{
    font-family:var(--serif-font); font-weight:600;
    font-size:22px; margin:0 0 6px;
  }
  .piece-meta{
    font-size:12.5px; color:var(--concrete); margin:0 0 14px;
    letter-spacing:.02em;
  }
  .piece-desc{
    font-size:14px; line-height:1.65; color:var(--ink-soft); margin:0 0 18px;
  }
  .piece-footer{
    display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap;
  }
  .piece-price{ font-family:var(--display-font); font-size:16px; }
  .piece-cta{
    font-family:var(--ui-font); font-size:12.5px; font-weight:600;
    letter-spacing:.04em; text-transform:uppercase;
    background:var(--ink); color:var(--white);
    padding:10px 20px; text-decoration:none;
    border: 1.5px solid var(--ink);
    transition: background .15s, color .15s;
  }
  .piece-cta:hover{ background:var(--white); color:var(--ink); }
  .piece-sold{
    font-family:var(--ui-font); font-size:11px; font-weight:600; letter-spacing:.1em;
    text-transform:uppercase; color:var(--concrete); border:1px solid var(--concrete-light);
    padding:9px 16px;
  }

  /* Empty state — shown when the ARTWORKS array is empty */
  .gallery-empty{
    text-align:center; padding:70px 20px;
    border: 1.5px dashed var(--concrete-light);
  }
  .gallery-empty h3{
    font-family:var(--serif-font); font-size:20px; margin:0 0 8px;
  }
  .gallery-empty p{ color:var(--concrete); font-size:14px; margin:0; }

  /* ============================================================
     FOOTER
     ============================================================ */
  .site-footer{
    border-top: var(--line);
    background:var(--ink); color:var(--canvas);
    padding:48px 24px 32px;
  }
  .footer-inner{
    max-width:760px; margin:0 auto; text-align:center;
  }
  .footer-title{
    /*font-family:var(--display-font);*/
    font-family:var(--momo-font);
    font-size:20px; text-transform:lowercase; margin:0 0 18px;
  }
  .footer-contact{
    display:flex; justify-content:center; gap:24px; flex-wrap:wrap; margin-bottom:22px;
  }
  .footer-contact a{
    display:inline-flex; align-items:center; gap:7px;
    text-decoration:none; color:var(--canvas); font-size:13.5px;
  }
  .footer-contact a svg{ width:17px; height:17px; fill:var(--canvas); }
  .footer-contact a:hover{ color:var(--accent); }
  .footer-contact a:hover svg{ fill:var(--accent); }
  .footer-delivery{
    font-size:12px; letter-spacing:.06em; text-transform:uppercase;
    color:#b9b9ae; margin:0 0 22px;
  }
  .footer-copy{ font-size:11.5px; color:#6f6f65; margin:0; }

  /* ============================================================
     FLOATING CONTACTS
     ============================================================ */
  .floating-contacts{
    position:fixed; bottom:22px; right:22px; z-index:50;
    display:flex; flex-direction:column; gap:10px; align-items:flex-end;
  }

  .footer-rule {
    width: 36px;
    height: 1px;
    background: #3c392f;
    margin: 0 auto 30px;
    border: none;
  }

  body.lang-ar .floating-contacts{ right:auto; left:22px; align-items:flex-start; }
  .floating-btn{
    width:46px; height:46px; border-radius:50%;
    background:var(--ink); border:1.5px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    text-decoration:none; 
    /*box-shadow:0 4px 14px rgba(0,0,0,.2);*/
    box-shadow: 0px 0px 7px 0px rgb(255 255 255 / 42%);
    transition: transform .15s, background .15s;
  }
  .floating-btn svg{ width:20px; height:20px; fill:var(--white); }
  .floating-btn:hover{ transform:translateY(-2px) scale(1.05); background:var(--accent); border-color:var(--accent); }

  @media (max-width:600px){
    .topbar{ padding:14px 16px; }
    .hero{ padding:44px 16px 30px; }
    .intro{ padding:0 16px 40px; }
    .gallery{ padding:0 16px 80px; }
  }

  @media (prefers-reduced-motion: reduce){
    .graffiti-top .track{ animation:none; }
    html{ scroll-behavior:auto; }
  }

  /* Responsive Rules Matrix */
  @media (max-width: 868px) {
    .gallery-grid { grid-template-columns: 1fr; gap: 60px; }
    .hero { padding: 60px 0; }
    .navbar { padding: 16px 24px; }
  }
  @media (max-width: 600px) {
    .contact-inline { display: none; } /* Kept safe in footer */
    .navbar { justify-content: center; gap: 16px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .graffiti-top .track { animation: none; }
    html { scroll-behavior: auto; }
  }

</style>
</head>

function contactIconMarkup(key){ return ICONS[key] || ""; }

/* =====================================================================
   4) RENDER LOGIC
   ===================================================================== */
let currentLang = "fr";

function buildContactList(target, floatingOnly){
  const frag = document.createDocumentFragment();
  Object.keys(CONTACT_CONFIG).forEach(function(key){
    const c = CONTACT_CONFIG[key];
    if(!c.enabled) return;
    if(floatingOnly && !c.floating) return;
    if(!floatingOnly && c.floating && target === "floating-skip") return;

    const a = document.createElement("a");
    a.href = c.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    if(c.label=="+212 6 52 61 80 38")
    {
      a.dir = "ltr";
    }

    if(floatingOnly){
      a.className = "floating-btn";
      a.innerHTML = contactIconMarkup(key);
      a.setAttribute("aria-label", c.label);
    } else {
      a.innerHTML = contactIconMarkup(key) + "<span>" + c.label + "</span>";
    }
    frag.appendChild(a);
  });
  return frag;
}

function renderContacts(){
  document.getElementById("contactInlineTop").innerHTML = "";
  document.getElementById("contactInlineTop").appendChild(buildContactList(null, false));

  document.getElementById("contactFooter").innerHTML = "";
  document.getElementById("contactFooter").appendChild(buildContactList(null, false));

  document.getElementById("floatingContacts").innerHTML = "";
  document.getElementById("floatingContacts").appendChild(buildContactList(null, true));
}

function renderGraffiti(){
  const top = document.getElementById("graffitiTop");
  const bg = document.getElementById("graffitiBg");
  top.style.display = "none";
  bg.style.display = "none";

  if(!GRAFFITI_CONFIG.enabled || GRAFFITI_CONFIG.mode === "none") return;

  if(GRAFFITI_CONFIG.mode === "top"){
    top.style.display = "block";
    const track = document.getElementById("graffitiTrack");
    track.innerHTML = "<span>" + GRAFFITI_CONFIG.text + "</span><span>" + GRAFFITI_CONFIG.text + "</span>";
  } else if(GRAFFITI_CONFIG.mode === "bg"){
    bg.style.display = "flex";
    document.getElementById("graffitiBgText").textContent = GRAFFITI_CONFIG.text;
  }
}

function priceLabel(piece){
  return '<span class="num">' + piece.price.toLocaleString() + '</span> ' + piece.currency;
}

function renderGallery(){
  const list = document.getElementById("galleryList");
  const count = document.getElementById("galleryCount");
  list.innerHTML = "";

  count.textContent = ARTWORKS.length
    ? String(ARTWORKS.length).padStart(2, "0")
    : "";

  if(ARTWORKS.length === 0){
    const t = I18N[currentLang];
    const empty = document.createElement("div");
    empty.className = "gallery-empty";
    empty.innerHTML = "<h3>" + t.emptyTitle + "</h3><p>" + t.emptyBody + "</p>";
    list.appendChild(empty);
    return;
  }

  const t = I18N[currentLang];

  ARTWORKS.forEach(function(piece, index){
    const el = document.createElement("article");
    el.className = "piece";

    const placeholderLabel = currentLang === "ar" ? "الصورة قريباً" : currentLang === "fr" ? "Image à venir" : "Image coming soon";

    const frameHtml = piece.image
      ? '<div class="piece-frame"><div class="corner tl"></div><div class="corner br"></div><img src="' + piece.image + '" alt="' + (piece.title[currentLang] || "") + '"></div>'
      : '<div class="piece-frame placeholder">' + ICONS.imgOff + '<span>' + placeholderLabel + '</span></div>';

    const footerHtml = piece.sold
      ? '<span class="piece-sold">' + t.sold + '</span>'
      : '<span class="piece-price">' + priceLabel(piece) + '</span><a class="piece-cta" href="' + (CONTACT_CONFIG.whatsapp.enabled ? CONTACT_CONFIG.whatsapp.url : (CONTACT_CONFIG.instagram.url || "#")) + "?text=Bonjour, je viens de votre site web et je suis intéressé(e) par votre œuvre intitulée « " + piece.title.fr + " »."+'" target="_blank" rel="noopener noreferrer">' + t.inquire + '</a>';

    el.innerHTML =
      frameHtml +
      '<div class="piece-body">' +
        '<div class="piece-num">' + t.piece + ' ' + String(index + 1).padStart(2, "0") + '</div>' +
        '<h3 class="piece-title">' + (piece.title[currentLang] || "") + '</h3>' +
        '<p class="piece-meta">' + (piece.medium[currentLang] || "") + '</p>' +
        '<p class="piece-desc">' + (piece.description[currentLang] || "") + '</p>' +
        '<div class="piece-footer">' + footerHtml + '</div>' +
      '</div>';

    list.appendChild(el);
  });
}

function applyTranslations(){
  const t = I18N[currentLang];
  document.getElementById("txt-tagline").textContent = t.tagline;
  document.getElementById("txt-delivery-top").textContent = t.delivery;
  document.getElementById("txt-intro").textContent = t.intro;
  document.getElementById("txt-gallery-heading").textContent = t.galleryHeading;
  document.getElementById("txt-delivery-footer").textContent = t.delivery;
  document.getElementById("txt-copyright").textContent = t.copyright;

  document.documentElement.lang = currentLang;
  document.documentElement.dir = t.dir;
  document.body.classList.toggle("lang-ar", currentLang === "ar");
}

function setLang(lang){
  currentLang = lang;
  document.querySelectorAll(".lang-switch button").forEach(function(btn){
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });
  applyTranslations();
  renderGallery();
}

document.getElementById("langSwitch").addEventListener("click", function(e){
  const btn = e.target.closest("button[data-lang]");
  if(btn) setLang(btn.dataset.lang);
});

/* =====================================================================
   5) INIT
   ===================================================================== */
renderContacts();
renderGraffiti();
setLang("fr");
</script>
