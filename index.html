<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHARING ART 4 ∞ — ORIGINAL WORKS — MADE BY HAND</title>

<style>
  /* ============================================================
     DESIGN TOKENS
     ============================================================ */
  :root{
    --canvas:#F7F7F2;
    --canvas-alt:#EFEEE6;
    --ink:#141414;
    --ink-soft:#3a3a37;
    --concrete:#8a8a82;
    --concrete-light:#d8d6cc;
    --accent:#2B4CFF;
    --accent-ink:#0e1f8f;
    --white:#ffffff;
    --line: 1px solid var(--ink);
    --line-soft: 1px solid var(--concrete-light);
    --display-font: 'Archivo Black', 'Cairo', sans-serif;
    --momo-font: 'Momo Signature', sans-serif;
    --serif-font: 'Fraunces', 'Cairo', serif;
    --ui-font: 'Inter', 'Cairo', sans-serif;
    --spray-font: 'Rubik Spray Paint', 'Cairo', cursive;
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--canvas);
    color:var(--ink);
    font-family:var(--ui-font);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* Arabic locale swaps default running text to Cairo across the board */
  body.lang-ar{ --ui-font:'Cairo', sans-serif; --serif-font:'Cairo', sans-serif; }
  body.lang-ar .site-title{ 
    /*font-family:'Cairo', sans-serif;*/
    font-family:var(--momo-font);
    font-weight:800; }

  [dir="ltr"] .num, [dir="rtl"] .num{ direction:ltr; unicode-bidi:isolate; }

  a{ color:inherit; }
  img{ max-width:100%; display:block; }

  .wrap{ max-width:960px; margin:0 auto; padding:0 24px; }

  /* ============================================================
     HEADER & GLOBAL NAVIGATION
     ============================================================ */

  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 32px;
    background: rgba(251, 251, 250, 0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(0,0,0,0.03);
  }

  /* ============================================================
     TOPBAR
     ============================================================ */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px;
    border-bottom: var(--line-soft);
    max-width:960px; margin:0 auto;
    gap:16px; flex-wrap:wrap;
  }
  .contact-inline{ display:flex; gap:18px; align-items:center; flex-wrap:wrap; }
  .contact-inline a{
    display:inline-flex; align-items:center; gap:6px;
    text-decoration:none; font-size:13px; letter-spacing:.02em;
    color:var(--ink-soft);
  }
  .contact-inline a svg{ width:16px; height:16px; fill:var(--ink-soft); }
  .contact-inline a:hover{ color:var(--accent); }
  .contact-inline a:hover svg{ fill:var(--accent); }

  .lang-switch{ display:flex; gap:2px; border: var(--line); }
  .lang-switch button{
    font-family:var(--ui-font); font-size:12px; font-weight:600; letter-spacing:.05em;
    background:none; border:none; padding:6px 12px; cursor:pointer; color:var(--ink-soft);
  }
  .lang-switch button.active{ background:var(--ink); color:var(--white); }
  .lang-switch button:not(.active):hover{ background:var(--canvas-alt); }

  .footer-divider {
    border: none;
    border-top: 1px solid #2c2a23;
    margin: 0 0 18px;
  }

  /* ============================================================
     GRAFFITI FEATURE — top strip mode
     ============================================================ */
  .graffiti-top{
    background:var(--ink);
    color:var(--white);
    padding:10px 0;
    overflow:hidden;
    white-space:nowrap;
    border-bottom: var(--line);
  }
  .graffiti-top .track{
    display:inline-block;
    font-family:var(--spray-font);
    font-size:26px;
    letter-spacing:.04em;
    animation: scrollTag 22s linear infinite;
  }
  .graffiti-top .track span{ padding:0 28px; opacity:.92; }
  @keyframes scrollTag{ from{ transform:translateX(0);} to{ transform:translateX(-50%);} }

  /* GRAFFITI FEATURE — background watermark mode */
  .graffiti-bg{
    position:absolute;
    inset:0;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
  }
  .graffiti-bg span{
    font-family:var(--spray-font);
    font-size:min(22vw, 260px);
    color:var(--ink);
    opacity:.05;
    white-space:nowrap;
    transform:rotate(-6deg);
  }

  /* ============================================================
     HERO
     ============================================================ */
  .site-header{ position:relative; }
  .hero{
    position:relative; z-index:1;
    max-width:960px; margin:0 auto;
    padding:64px 24px 40px;
    text-align:center;
  }
  .site-title{
    font-family:var(--momo-font);
    font-size:clamp(34px, 7vw, 72px);
    line-height:0.98;
    margin:0 0 18px;
    /*margin: -8px 0px 5px;*/
    text-transform:lowercase;
    /*letter*/-spacing:-.01em;
  }
  .site-title .infinity{ color:var(--accent); }
  .tagline{
    font-family:var(--serif-font);
    font-style:italic;
    font-size:clamp(19px, 2.4vw, 20px);
    color:var(--ink-soft);
    max-width:520px;
    margin:0 auto 22px;
    font-weight:400;
  }
  .delivery-line{
    display:inline-block;
    font-family:var(--ui-font);
    font-size:15px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--white);
    background:var(--accent);
    padding:7px 16px;
  }

  /* ============================================================
     INTRO
     ============================================================ */
  .intro{
    max-width:640px; margin:0 auto;
    padding:8px 24px 56px;
    text-align:center;
  }
  .intro p{
    font-size:15.5px; line-height:1.7; color:var(--ink-soft); margin:0;
  }

  /* ============================================================
     GALLERY — vertical stack
     ============================================================ */
  .gallery{ max-width:760px; margin:0 auto; padding:0 24px 100px; }
  .gallery-heading{
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom: var(--line);
    padding-bottom:10px; margin-bottom:8px;
  }
  .gallery-heading h2{
    font-family:var(--display-font);
    font-size:14px; text-transform:uppercase; letter-spacing:.14em;
    margin:0;
  }
  .gallery-heading .count{ font-size:12px; color:var(--concrete); font-family:var(--ui-font); }

  .piece{
    display:grid; grid-template-columns: 1fr;
    border-bottom: var(--line-soft);
    padding:44px 0;
  }
  .piece:first-of-type{ padding-top:32px; }

  .piece-frame{
    position:relative;
    border: 1.5px solid var(--ink);
    background:var(--canvas-alt);
    aspect-ratio: 4 / 5;
    max-width:420px;
    margin:0 auto 26px;
    overflow:hidden;
  }
  .piece-frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  .piece-frame .corner{
    position:absolute; width:14px; height:14px;
    border-color:var(--accent); border-style:solid; border-width:0;
  }
  .piece-frame .corner.tl{ top:-1.5px; left:-1.5px; border-top-width:3px; border-left-width:3px; }
  .piece-frame .corner.br{ bottom:-1.5px; right:-1.5px; border-bottom-width:3px; border-right-width:3px; }

  .piece-frame.placeholder{
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:8px;
    color:var(--concrete);
  }
  .piece-frame.placeholder svg{ width:34px; height:34px; opacity:.5; }
  .piece-frame.placeholder span{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; }

  /* ============================================================
     GALLERY — carousel + zoom affordances
     ============================================================ */
  .piece-frame .carousel-track{
    display:flex; width:100%; height:100%;
    transition: transform .35s ease;
  }
  .piece-frame .carousel-track img{
    flex: 0 0 100%; width:100%; height:100%; object-fit:cover;
    cursor: zoom-in;
  }
  .piece-frame .carousel-arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:32px; height:32px; border-radius:50%;
    background:rgba(20,20,20,.55); border:1.5px solid rgba(255,255,255,.7);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:2; padding:0;
    transition: background .15s, transform .15s;
  }
  .piece-frame .carousel-arrow:hover{ background:var(--accent); }
  .piece-frame .carousel-arrow svg{ width:16px; height:16px; fill:none; stroke:var(--white); stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; }
  .piece-frame .carousel-arrow.prev{ left:10px; }
  .piece-frame .carousel-arrow.next{ right:10px; }
  .piece-frame .carousel-dots{
    position:absolute; bottom:10px; left:0; right:0;
    display:flex; justify-content:center; gap:6px; z-index:2;
  }
  .piece-frame .carousel-dots button{
    width:6px; height:6px; border-radius:50%; padding:0;
    border:1px solid rgba(255,255,255,.9);
    background:rgba(255,255,255,.35); cursor:pointer;
  }
  .piece-frame .carousel-dots button.active{ background:var(--white); }
  .piece-frame .zoom-hint{
    position:absolute; top:10px; right:10px; z-index:2;
    width:28px; height:28px; border-radius:50%;
    background:rgba(20,20,20,.55);
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .piece-frame .zoom-hint svg{ width:14px; height:14px; fill:none; stroke:var(--white); stroke-width:2.2; stroke-linecap:round; }

  /* ============================================================
     LIGHTBOX — zoomable image viewer
     ============================================================ */
  .lightbox-overlay{
    position:fixed; inset:0; z-index:1000;
    background:rgba(10,10,10,.94);
    display:none; align-items:center; justify-content:center;
    flex-direction:column;
  }
  .lightbox-overlay.open{ display:flex; }
  .lightbox-stage{
    position:relative;
    width:min(92vw, 900px); height:min(80vh, 820px);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    touch-action:none;
  }
  .lightbox-stage img{
    max-width:100%; max-height:100%;
    width:auto; height:auto;
    object-fit:contain;
    cursor:zoom-in;
    user-select:none; -webkit-user-drag:none;
    transition: transform .12s ease-out;
    transform-origin:center center;
  }
  .lightbox-stage img.zoomed{ cursor:grab; }
  .lightbox-stage img.dragging{ cursor:grabbing; transition:none; }
  .lightbox-close{
    position:absolute; top:18px; right:18px; z-index:1002;
    width:42px; height:42px; border-radius:50%;
    background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.5);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .lightbox-close svg{ width:18px; height:18px; fill:none; stroke:var(--white); stroke-width:2.2; stroke-linecap:round; }
  .lightbox-close:hover{ background:var(--accent); border-color:var(--accent); }
  .lightbox-arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:48px; height:48px; border-radius:50%;
    background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.5);
    display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:1002;
  }
  .lightbox-arrow:hover{ background:var(--accent); border-color:var(--accent); }
  .lightbox-arrow svg{ width:20px; height:20px; fill:none; stroke:var(--white); stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
  .lightbox-arrow.prev{ left:12px; }
  .lightbox-arrow.next{ right:12px; }
  .lightbox-meta{
    margin-top:16px; text-align:center; color:var(--canvas);
    font-family:var(--ui-font);
  }
  .lightbox-meta .lb-title{ font-family:var(--serif-font); font-size:17px; margin:0 0 4px; }
  .lightbox-meta .lb-counter{ font-size:12px; letter-spacing:.08em; color:#b9b9ae; }
  .lightbox-hint{
    margin-top:10px; font-size:11px; letter-spacing:.05em;
    color:#8a8a82; text-transform:uppercase;
  }
  @media (max-width:600px){
    .lightbox-arrow{ width:38px; height:38px; }
    .lightbox-close{ width:36px; height:36px; top:12px; right:12px; }
    .piece-frame .carousel-arrow{ width:28px; height:28px; }
  }

  .piece-body{ text-align:center; max-width:480px; margin:0 auto; }
  .piece-num{
    font-family:var(--ui-font); font-size:11px; letter-spacing:.14em;
    color:var(--accent); font-weight:600; margin-bottom:8px;
  }
  .piece-title{
    font-family:var(--serif-font); font-weight:600;
    font-size:22px; margin:0 0 6px;
  }
  .piece-meta{
    font-size:12.5px; color:var(--concrete); margin:0 0 14px;
    letter-spacing:.02em;
  }
  .piece-desc{
    font-size:14px; line-height:1.65; color:var(--ink-soft); margin:0 0 18px;
  }
  .piece-footer{
    display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap;
  }
  .piece-price{ font-family:var(--display-font); font-size:16px; display: none; }
  .piece-cta{
    font-family:var(--ui-font); font-size:12.5px; font-weight:600;
    letter-spacing:.04em; text-transform:uppercase;
    background:var(--ink); color:var(--white);
    padding:10px 20px; text-decoration:none;
    border: 1.5px solid var(--ink);
    transition: background .15s, color .15s;
    display: none;
  }
  .piece-cta:hover{ background:var(--white); color:var(--ink); }
  .piece-sold{
    font-family:var(--ui-font); font-size:11px; font-weight:600; letter-spacing:.1em;
    text-transform:uppercase; color:var(--concrete); border:1px solid var(--concrete-light);
    padding:9px 16px;
  }

  /* Empty state — shown when the ARTWORKS array is empty */
  .gallery-empty{
    text-align:center; padding:70px 20px;
    border: 1.5px dashed var(--concrete-light);
  }
  .gallery-empty h3{
    font-family:var(--serif-font); font-size:20px; margin:0 0 8px;
  }
  .gallery-empty p{ color:var(--concrete); font-size:14px; margin:0; }

  /* ============================================================
     FOOTER
     ============================================================ */
  .site-footer{
    border-top: var(--line);
    background:var(--ink); color:var(--canvas);
    padding:48px 24px 32px;
  }
  .footer-inner{
    max-width:760px; margin:0 auto; text-align:center;
  }
  .footer-title{
    /*font-family:var(--display-font);*/
    font-family:var(--momo-font);
    font-size:20px; text-transform:lowercase; margin:0 0 18px;
  }
  .footer-contact{
    display:flex; justify-content:center; gap:24px; flex-wrap:wrap; margin-bottom:22px;
  }
  .footer-contact a{
    display:inline-flex; align-items:center; gap:7px;
    text-decoration:none; color:var(--canvas); font-size:13.5px;
  }
  .footer-contact a svg{ width:17px; height:17px; fill:var(--canvas); }
  .footer-contact a:hover{ color:var(--accent); }
  .footer-contact a:hover svg{ fill:var(--accent); }
  .footer-delivery{
    font-size:12px; letter-spacing:.06em; text-transform:uppercase;
    color:#b9b9ae; margin:0 0 22px;
  }
  .footer-copy{ font-size:11.5px; color:#6f6f65; margin:0; }

  /* ============================================================
     FLOATING CONTACTS
     ============================================================ */
  .floating-contacts{
    position:fixed; bottom:22px; right:22px; z-index:50;
    display:flex; flex-direction:column; gap:10px; align-items:flex-end;
  }

  .footer-rule {
    width: 36px;
    height: 1px;
    background: #3c392f;
    margin: 0 auto 30px;
    border: none;
  }

  body.lang-ar .floating-contacts{ right:auto; left:22px; align-items:flex-start; }
  .floating-btn{
    width:46px; height:46px; border-radius:50%;
    background:var(--ink); border:1.5px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    text-decoration:none; 
    /*box-shadow:0 4px 14px rgba(0,0,0,.2);*/
    box-shadow: 0px 0px 7px 0px rgb(255 255 255 / 42%);
    transition: transform .15s, background .15s;
  }
  .floating-btn svg{ width:20px; height:20px; fill:var(--white); }
  .floating-btn:hover{ transform:translateY(-2px) scale(1.05); background:var(--accent); border-color:var(--accent); }

  @media (max-width:600px){
    .topbar{ padding:14px 16px; }
    .hero{ padding:44px 16px 30px; }
    .intro{ padding:0 16px 40px; }
    .gallery{ padding:0 16px 80px; }
  }

  @media (prefers-reduced-motion: reduce){
    .graffiti-top .track{ animation:none; }
    html{ scroll-behavior:auto; }
  }

  /* Responsive Rules Matrix */
  @media (max-width: 868px) {
    .gallery-grid { grid-template-columns: 1fr; gap: 60px; }
    .hero { padding: 60px 0; }
    .navbar { padding: 16px 24px; }
  }
  @media (max-width: 600px) {
    .contact-inline { display: none; } /* Kept safe in footer */
    .navbar { justify-content: center; gap: 16px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .graffiti-top .track { animation: none; }
    html { scroll-behavior: auto; }
  }

</style>

  <header class="site-header">

      <!-- <div class="contact-inline" id="contactInlineTop"></div> -->

    <div class="footer-inner">

      <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <div class="lightbox-stage" id="lightboxStage">
      <img id="lightboxImg" src="" alt="">
    </div>
    <button class="lightbox-arrow next" id="lightboxNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>

      <p class="lb-title" id="lightboxTitle"></p>

    </div>
  </div>

function buildContactList(target, floatingOnly){
  const frag = document.createDocumentFragment();
  Object.keys(CONTACT_CONFIG).forEach(function(key){
    const c = CONTACT_CONFIG[key];
    if(!c.enabled) return;
    if(floatingOnly && !c.floating) return;
    if(!floatingOnly && c.floating && target === "floating-skip") return;

    const a = document.createElement("a");
    a.href = c.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    if(c.label=="+212 6 52 61 80 38")
    {
      a.dir = "ltr";
    }

    if(floatingOnly){
      a.className = "floating-btn";
      a.innerHTML = contactIconMarkup(key);
      a.setAttribute("aria-label", c.label);
    } else {
      a.innerHTML = contactIconMarkup(key) + "<span>" + c.label + "</span>";
    }
    frag.appendChild(a);
  });
  return frag;
}

/* =====================================================================
   5) GALLERY CAROUSEL — arrows, dots, swipe
   ===================================================================== */
function setActiveSlide(frame, newIndex){
  const track = frame.querySelector(".carousel-track");
  const slides = track.children;
  const total = slides.length;
  if(total === 0) return;
  const clamped = ((newIndex % total) + total) % total;
  track.style.transform = "translateX(-" + (clamped * 100) + "%)";
  frame.setAttribute("data-active-index", String(clamped));
  frame.querySelectorAll(".carousel-dots button").forEach(function(dot, i){
    dot.classList.toggle("active", i === clamped);
  });
}

function bindCarouselSwipe(){
  const list = document.getElementById("galleryList");
  list.querySelectorAll(".piece-frame").forEach(function(frame){
    const track = frame.querySelector(".carousel-track");
    if(!track || track.children.length < 2 || track.dataset.swipeBound) return;
    track.dataset.swipeBound = "1";
    let startX = 0, startY = 0, dragging = false;

    track.addEventListener("pointerdown", function(e){
      startX = e.clientX; startY = e.clientY; dragging = true;
    });
    track.addEventListener("pointerup", function(e){
      if(!dragging) return;
      dragging = false;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if(Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
        const current = parseInt(frame.getAttribute("data-active-index"), 10) || 0;
        setActiveSlide(frame, current + (dx < 0 ? 1 : -1));
      }
    });
    track.addEventListener("pointercancel", function(){ dragging = false; });
  });
}

function initGalleryInteractions(){
  const list = document.getElementById("galleryList");

  list.addEventListener("click", function(e){
    const arrowBtn = e.target.closest(".carousel-arrow");
    if(arrowBtn){
      e.preventDefault();
      e.stopPropagation();
      const frame = arrowBtn.closest(".piece-frame");
      const current = parseInt(frame.getAttribute("data-active-index"), 10) || 0;
      const dir = arrowBtn.dataset.action === "next" ? 1 : -1;
      setActiveSlide(frame, current + dir);
      return;
    }

    const dotBtn = e.target.closest("[data-dot-index]");
    if(dotBtn){
      e.preventDefault();
      e.stopPropagation();
      const frame = dotBtn.closest(".piece-frame");
      setActiveSlide(frame, parseInt(dotBtn.dataset.dotIndex, 10) || 0);
      return;
    }

    const img = e.target.closest(".carousel-track img");
    if(img){
      const frame = img.closest(".piece-frame");
      const pieceIndex = parseInt(frame.getAttribute("data-piece-index"), 10);
      const imgIndex = parseInt(img.getAttribute("data-img-index"), 10) || 0;
      openLightbox(pieceIndex, imgIndex);
    }
  });

  bindCarouselSwipe();
}

  lb.prevBtn = document.getElementById("lightboxPrev");
  lb.nextBtn = document.getElementById("lightboxNext");
  lb.closeBtn = document.getElementById("lightboxClose");
}

function lightboxHintText(){
  if(currentLang === "ar") return "انقر للتكبير · اسحب للتحريك";
  if(currentLang === "fr") return "Cliquez pour zoomer · glissez pour déplacer";
  return "Click to zoom · drag to pan";
}

function resetZoom(){
  lightboxState.scale = 1;
  lightboxState.panX = 0;
  lightboxState.panY = 0;
  applyZoomTransform();
  lb.img.classList.remove("zoomed", "dragging");
}

function applyZoomTransform(){
  lb.img.style.transform = "translate(" + lightboxState.panX + "px, " + lightboxState.panY + "px) scale(" + lightboxState.scale + ")";
}

function updateLightboxContent(){
  const piece = ARTWORKS[lightboxState.pieceIndex];
  const images = getPieceImages(piece);
  lightboxState.images = images;
  const src = images[lightboxState.imageIndex];
  lb.img.src = src || "";
  lb.img.alt = piece.title[currentLang] || "";
  lb.title.textContent = piece.title[currentLang] || "";
  lb.counter.textContent = images.length > 1
    ? (lightboxState.imageIndex + 1) + " / " + images.length
    : "";
  lb.hint.textContent = lightboxHintText();
  const multi = images.length > 1;
  lb.prevBtn.style.display = multi ? "flex" : "none";
  lb.nextBtn.style.display = multi ? "flex" : "none";
  resetZoom();
}

function openLightbox(pieceIndex, imageIndex){
  lightboxState.pieceIndex = pieceIndex;
  lightboxState.imageIndex = imageIndex || 0;
  updateLightboxContent();
  lb.overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox(){
  lb.overlay.classList.remove("open");
  document.body.style.overflow = "";
  resetZoom();
}

function lightboxStep(dir){
  const total = lightboxState.images.length;
  if(total < 2) return;
  lightboxState.imageIndex = ((lightboxState.imageIndex + dir) % total + total) % total;
  updateLightboxContent();
}

function initLightbox(){
  cacheLightboxEls();

  lb.closeBtn.addEventListener("click", closeLightbox);
  lb.overlay.addEventListener("click", function(e){
    if(e.target === lb.overlay) closeLightbox();
  });
  lb.prevBtn.addEventListener("click", function(){ lightboxStep(-1); });
  lb.nextBtn.addEventListener("click", function(){ lightboxStep(1); });

  document.addEventListener("keydown", function(e){
    if(!lb.overlay.classList.contains("open")) return;
    if(e.key === "Escape") closeLightbox();
    else if(e.key === "ArrowRight") lightboxStep(1);
    else if(e.key === "ArrowLeft") lightboxStep(-1);
  });

  // Click to toggle zoom in/out
  lb.img.addEventListener("click", function(e){
    if(lightboxState.isDragging) return;
    if(lightboxState.scale === 1){
      lightboxState.scale = 2.2;
      lb.img.classList.add("zoomed");
    } else {
      lightboxState.scale = 1;
      lightboxState.panX = 0;
      lightboxState.panY = 0;
      lb.img.classList.remove("zoomed");
    }
    applyZoomTransform();
  });

  // Wheel to zoom, clamped
  lb.stage.addEventListener("wheel", function(e){
    e.preventDefault();
    const delta = e.deltaY < 0 ? 0.2 : -0.2;
    const next = Math.min(4, Math.max(1, lightboxState.scale + delta));
    lightboxState.scale = next;
    if(next === 1){ lightboxState.panX = 0; lightboxState.panY = 0; lb.img.classList.remove("zoomed"); }
    else{ lb.img.classList.add("zoomed"); }
    applyZoomTransform();
  }, { passive:false });

  // Drag to pan when zoomed
  lb.img.addEventListener("pointerdown", function(e){
    if(lightboxState.scale === 1) return;
    lightboxState.isDragging = true;
    lightboxState.dragStartX = e.clientX;
    lightboxState.dragStartY = e.clientY;
    lightboxState.panStartX = lightboxState.panX;
    lightboxState.panStartY = lightboxState.panY;
    lb.img.classList.add("dragging");
    lb.img.setPointerCapture(e.pointerId);
  });
  lb.img.addEventListener("pointermove", function(e){
    if(!lightboxState.isDragging) return;
    lightboxState.panX = lightboxState.panStartX + (e.clientX - lightboxState.dragStartX);
    lightboxState.panY = lightboxState.panStartY + (e.clientY - lightboxState.dragStartY);
    applyZoomTransform();
  });
  ["pointerup", "pointercancel", "pointerleave"].forEach(function(evt){
    lb.img.addEventListener(evt, function(){
      lightboxState.isDragging = false;
      lb.img.classList.remove("dragging");
    });
  });

  // Basic pinch-to-zoom on touch devices
  let pinchStartDist = null;
  let pinchStartScale = 1;
  lb.stage.addEventListener("touchstart", function(e){
    if(e.touches.length === 2){
      pinchStartDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      pinchStartScale = lightboxState.scale;
    }
  }, { passive:true });
  lb.stage.addEventListener("touchmove", function(e){
    if(e.touches.length === 2 && pinchStartDist){
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const next = Math.min(4, Math.max(1, pinchStartScale * (dist / pinchStartDist)));
      lightboxState.scale = next;
      lb.img.classList.toggle("zoomed", next > 1);
      applyZoomTransform();
    }
  }, { passive:false });
  lb.stage.addEventListener("touchend", function(e){
    if(e.touches.length < 2) pinchStartDist = null;
  });
}

/* =====================================================================
   7) INIT
   ===================================================================== */
renderContacts();
renderGraffiti();
setLang("fr");
initLightbox();
initGalleryInteractions();
</script>
</body>
